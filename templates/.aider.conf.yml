## ROLDAO-METHOD configuração para Aider
## https://aider.chat
##
## RESUMO INLINE (o Aider não tem hooks bloqueadores — disciplina por prompt):
## - REGRA #0: bug = investigar o estado real (banco/log/payload) ANTES de mexer
##   no código; corrigir a causa raiz, nunca o sintoma. Confirmar se houver ambiguidade.
## - Sequência obrigatória de agentes em /feature (NO Claude Code há hook que
##   bloqueia; no Aider VOCÊ é o gate): Sofia (gerente-produto) → Detetive
##   (investigador) → Rafael (tech-lead) → Bruno (dev-senior) → Inês (revisor)
##   → Caio (segurança) + Júlia (qualidade) + Pedro (produto). Em /bug, Detetive
##   ANTES de qualquer edição.
## - Usuário pode não programar: PT-BR sem jargão; executar, não perguntar "quer que eu...?".
## - NUNCA: rm -rf, git push --force, git reset --hard, --no-verify; secret em código/commit;
##   @ts-ignore/.skip()/assertTrue(true)/eslint-disable/"|| true" (mascaramento);
##   mock em integration/e2e; TODO sem ID; dado pessoal real em fixture; URL/ambiente fiscal hardcoded.
## - Spec gera código. Override do projeto em .specify/overrides/ vence o core (não burla REGRAS-INEGOCIAVEIS.md).
## O contrato completo está nos arquivos lidos abaixo — leia-os de fato.

# Carrega o contrato canônico do projeto
read:
  - AGENTS.md
  - CLAUDE.md
  - REGRAS-INEGOCIAVEIS.md
  - .specify/memory/constitution.md

# Idioma de saída
chat-language: pt

# Convenções de commit (segue commit-message-validator do ROLDAO-METHOD)
commit-prompt: |
  Gera mensagem de commit em PT-BR seguindo Keep a Changelog.
  Prefixo: feat|fix|refactor|chore|docs|test|perf|build|ci (1 por commit).
  Primeira linha ≤ 72 caracteres.
  Não usar prefixos misturados.

attribute-author: true
attribute-committer: true

# Não usar --no-verify
git-commit-verify: true
