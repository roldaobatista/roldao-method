name: validar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Menor privilégio: o workflow só lê o repo (não publica, não comenta).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validar-templates:
    name: Validar templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sanity (node --check) em todos os .js do projeto
        run: |
          set -e
          node --check bin/install.js
          node --check tools/validar-templates.js
          node --check test/install.test.js
          node --check evals/run.js
      - name: Validar estrutura
        run: node tools/validar-templates.js

  rodar-hooks:
    name: Test-runner dos hooks (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Rodar test-runner (Unix)
        if: runner.os != 'Windows'
        run: bash templates/.claude/hooks/_test-runner.sh
      - name: Rodar test-runner (Windows via Git Bash)
        if: runner.os == 'Windows'
        shell: bash
        run: bash templates/.claude/hooks/_test-runner.sh

  smoke-install:
    name: Smoke test do instalador (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Rodar test/install.test.js
        run: node test/install.test.js

  validar-skills-python:
    name: Skills BR (Python)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Detectar binario Python (python3 no Unix, python no Windows)
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            echo "PY=python3" >> $GITHUB_ENV
          else
            echo "PY=python" >> $GITHUB_ENV
          fi
      - name: validar-cpf-cnpj
        shell: bash
        run: |
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12345678909"
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "11222333000181"
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12ABC34501DE35"
      - name: validar-pix
        shell: bash
        run: |
          $PY templates/.claude/skills/validar-pix/scripts/validar-pix.py "cliente@empresa.com.br"
          $PY templates/.claude/skills/validar-pix/scripts/validar-pix.py "+5511987654321"
      - name: validar-cep (formato)
        shell: bash
        run: $PY templates/.claude/skills/validar-cep/scripts/validar-cep.py "01310-100"
      - name: gerar-test-fixture-br
        shell: bash
        run: |
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cnpj 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cep 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py telefone 3
      - name: gerar-test-fixture-br — rejeita N <= 0
        shell: bash
        run: |
          if $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf -5 2>/dev/null; then
            echo "ERRO: gerar.py deveria rejeitar n=-5"
            exit 1
          fi
          if $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf 0 2>/dev/null; then
            echo "ERRO: gerar.py deveria rejeitar n=0"
            exit 1
          fi
      - name: skills encoding UTF-8 (locale C-like)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Forca locale ASCII pra simular Windows sem UTF-8 e ver se acentos sobrevivem.
          LC_ALL=C $PY templates/.claude/skills/validar-cep/scripts/validar-cep.py "00000-000" | grep -q "sequência" || (echo "FAIL acento perdido em validar-cep"; exit 1)

  lint-evals:
    name: Lint estrutural dos evals (cobertura 12/12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint estrutural dos evals (não é eval de comportamento)
        run: node evals/run.js

  suite-completa:
    name: Suite completa (npm test) + permissão dos hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: npm test (validar + hooks + install + skills)
        run: npm test
      - name: Hooks instalados têm bit de execução (P0 — diferencial inerte sem isto)
        shell: bash
        run: |
          set -e
          TMP=$(mktemp -d)
          node bin/install.js install --yes --tool=claude-code "$TMP" >/dev/null 2>&1 || node bin/install.js install --yes >/dev/null 2>&1 || true
          HK=$(find "$TMP" -path '*/.claude/hooks/*.sh' 2>/dev/null | head -1)
          [ -z "$HK" ] && HK=$(find . -maxdepth 4 -path '*/.claude/hooks/block-destructive.sh' | head -1)
          if [ -n "$HK" ] && [ ! -x "$HK" ]; then
            echo "FAIL: hook instalado sem +x: $HK"; exit 1
          fi
          echo "OK: hook executável ($HK)"
