name: validar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Menor privilégio: o workflow só lê o repo (não publica, não comenta).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validar-templates:
    name: Validar templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sanity (node --check) em todos os .js do projeto
        run: |
          set -euo pipefail
          node --check bin/install.js
          node --check tools/validar-templates.js
          node --check tools/validar-ids-rastreaveis.js
          node --check tools/validar-cobertura-hooks.js
          node --check tools/sincronizar-claude-md.js
          node --check test/install.test.js
          node --check evals/run.js
      - name: Validar estrutura
        run: node tools/validar-templates.js
      - name: Validar rastreabilidade de IDs (REGRAS-INEGOCIAVEIS.md)
        run: node tools/validar-ids-rastreaveis.js
      - name: Validar cobertura de hooks (todo bloqueador tem run_case)
        run: node tools/validar-cobertura-hooks.js

  shellcheck-hooks:
    name: shellcheck nos hooks (.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Rodar shellcheck (severity=warning)
        run: |
          set -euo pipefail
          # Inclui hooks publicados nos templates + hooks de addons.
          # SC1091 (não consegue seguir source dinâmico) é esperado em hooks que
          # sourceiam _lib.sh via "$(dirname "$0")/_lib.sh" — usamos shellcheck
          # source=_lib.sh no header pra resolução estática.
          shellcheck --severity=warning --shell=bash \
            --exclude=SC1091 \
            templates/.claude/hooks/*.sh
          # Hooks de addons quando existirem (alguns addons trazem .sh).
          ADDON_HOOKS=$(find addons -path '*/.claude/hooks/*.sh' 2>/dev/null || true)
          if [ -n "$ADDON_HOOKS" ]; then
            # shellcheck disable=SC2086
            shellcheck --severity=warning --shell=bash --exclude=SC1091 $ADDON_HOOKS
          fi

  rodar-hooks:
    name: Test-runner dos hooks (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Rodar test-runner (Unix)
        if: runner.os != 'Windows'
        run: bash templates/.claude/hooks/_test-runner.sh
      - name: Rodar test-runner (Windows via Git Bash)
        if: runner.os == 'Windows'
        shell: bash
        run: bash templates/.claude/hooks/_test-runner.sh

  smoke-install:
    name: Smoke test do instalador (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Rodar test/install.test.js
        run: node test/install.test.js

  validar-skills-python:
    name: Skills BR (Python)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Detectar binario Python (python3 no Unix, python no Windows)
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then
            echo "PY=python3" >> "$GITHUB_ENV"
          else
            echo "PY=python" >> "$GITHUB_ENV"
          fi
      - name: validar-cpf-cnpj
        shell: bash
        run: |
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12345678909"
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "11222333000181"
          $PY templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12ABC34501DE35"
      - name: validar-pix
        shell: bash
        run: |
          $PY templates/.claude/skills/validar-pix/scripts/validar-pix.py "cliente@empresa.com.br"
          $PY templates/.claude/skills/validar-pix/scripts/validar-pix.py "+5511987654321"
      - name: validar-cep (formato)
        shell: bash
        run: $PY templates/.claude/skills/validar-cep/scripts/validar-cep.py "01310-100"
      - name: gerar-test-fixture-br
        shell: bash
        run: |
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cnpj 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cep 3
          $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py telefone 3
      - name: gerar-test-fixture-br — rejeita N <= 0
        shell: bash
        run: |
          if $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf -5 2>/dev/null; then
            echo "ERRO: gerar.py deveria rejeitar n=-5"
            exit 1
          fi
          if $PY templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf 0 2>/dev/null; then
            echo "ERRO: gerar.py deveria rejeitar n=0"
            exit 1
          fi
      - name: skills encoding UTF-8 (locale C-like)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Forca locale ASCII pra simular Windows sem UTF-8 e ver se acentos sobrevivem.
          # validar-cep com "00000-000" emite "CEP zerado não existe" — `não` (com
          # til) e o canario UTF-8. Antes esperava "sequência" que nao existia em
          # nenhuma mensagem do script (test sempre falhava).
          set -euo pipefail
          OUT=$(LC_ALL=C $PY templates/.claude/skills/validar-cep/scripts/validar-cep.py "00000-000")
          if ! grep -q "não" <<< "$OUT"; then
            echo "FAIL acento perdido em validar-cep — saida: $OUT"
            exit 1
          fi

  lint-evals:
    name: Lint estrutural dos evals (cobertura 12/12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint estrutural dos evals (não é eval de comportamento)
        run: node evals/run.js

  suite-completa:
    name: Suite completa (npm test) + permissão dos hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: npm test (validar + hooks + install + skills)
        run: npm test
      - name: Hooks instalados têm bit de execução (P0 — diferencial inerte sem isto)
        shell: bash
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          ROOT=$(pwd)
          # bin/install.js instala em CWD (não aceita arg posicional pra destino),
          # então o jeito correto de simular instalação isolada é entrar no $TMP
          # e chamar o instalador via path absoluto. Antes o "$TMP" virava arg
          # ignorado e o install copiava por cima do repo, deixando HK vazio.
          (cd "$TMP" && node "$ROOT/bin/install.js" install --yes >/dev/null 2>&1)
          HK=$(find "$TMP" -path '*/.claude/hooks/*.sh' 2>/dev/null | head -1)
          if [ -z "$HK" ]; then
            echo "FAIL: install não criou nenhum hook em $TMP"
            exit 1
          fi
          if [ ! -x "$HK" ]; then
            echo "FAIL: hook instalado sem +x: $HK"
            exit 1
          fi
          echo "OK: hook executável ($HK)"

  empacotamento:
    name: Empacotamento npm (pack dry-run + sanidade)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm pack --dry-run e checagens de sanidade
        shell: bash
        run: |
          set -euo pipefail
          OUT=$(npm pack --dry-run --json)
          # `echo | head -100` falha com pipefail quando o JSON > buffer de pipe
          # (SIGPIPE no echo). Heredoc string evita o pipe entirely.
          head -100 <<< "$OUT"
          # Tamanho descompactado nao pode disparar (regressao silenciosa em files)
          SIZE=$(node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const a=JSON.parse(s);console.log(a[0].unpackedSize)})" <<< "$OUT")
          MAX=$((2*1024*1024))  # 2 MB descompactado — alerta de regressao
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "FAIL: pacote descompactado $SIZE bytes (>2MB). Algum arquivo grande vazou no files?"
            exit 1
          fi
          echo "OK: pacote descompactado $SIZE bytes (<2MB)"
          # Guias internos NAO podem vazar pro tarball
          if grep -q "docs/PUBLICAR-NPM.md" <<< "$OUT"; then
            echo "FAIL: docs/PUBLICAR-NPM.md vazou pro tarball — corrigir .npmignore/files"
            exit 1
          fi
          echo "OK: guias internos excluidos do tarball"
