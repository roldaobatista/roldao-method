name: validar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validar-templates:
    name: Validar templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validar estrutura
        run: node tools/validar-templates.js

  rodar-hooks:
    name: Test-runner dos hooks (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Rodar test-runner (Unix)
        if: runner.os != 'Windows'
        run: bash templates/.claude/hooks/_test-runner.sh
      - name: Rodar test-runner (Windows via Git Bash)
        if: runner.os == 'Windows'
        shell: bash
        run: bash templates/.claude/hooks/_test-runner.sh

  smoke-install:
    name: Smoke test do instalador (matriz)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Rodar test/install.test.js
        run: node test/install.test.js

  validar-skills-python:
    name: Skills BR (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: validar-cpf-cnpj
        run: |
          python3 templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12345678909"
          python3 templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "11222333000181"
          python3 templates/.claude/skills/validar-cpf-cnpj/scripts/validar.py "12ABC34501DE35"
      - name: validar-pix
        run: |
          python3 templates/.claude/skills/validar-pix/scripts/validar-pix.py "cliente@empresa.com.br"
          python3 templates/.claude/skills/validar-pix/scripts/validar-pix.py "+5511987654321"
      - name: validar-cep (formato)
        run: python3 templates/.claude/skills/validar-cep/scripts/validar-cep.py "01310-100"
      - name: gerar-test-fixture-br
        run: |
          python3 templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cpf 3
          python3 templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cnpj 3
          python3 templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py cep 3
          python3 templates/.claude/skills/gerar-test-fixture-br/scripts/gerar.py telefone 3

  rodar-evals:
    name: Evals dos agentes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar evals
        run: node evals/run.js
