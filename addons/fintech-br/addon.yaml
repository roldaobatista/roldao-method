name: fintech-br
version: 1.0.0
description: Pix completo (chave, BR Code, cobrança, devolução, Pix Automático) + Open Finance Brasil + validações financeiras BR
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.4.0"

provoca:
  agents:
    - pix-arch
  commands: []
  hooks:
    - validate-webhook-signature
  skills:
    - gerar-br-code-typescript
    - validar-webhook-pix
    - estruturar-open-finance
  templates: []

regras:
  # PIX-EXT-* sao IMPLEMENTACAO OPERACIONAL das regras PIX-001..005 do core
  # (REGRAS-INEGOCIAVEIS.md). Cite o ID do core em commits/ADR; o ID -EXT
  # serve so para localizar o hook/skill que aplica a regra neste addon.
  - id: PIX-EXT-001
    aplica: PIX-001
    titulo: "Implementacao da idempotencia por TxId"
    descricao: "Concretiza PIX-001 do core: TxId deterministico + Idempotency-Key + lock + UNIQUE. Skill: validar-webhook-pix."
  - id: PIX-EXT-002
    aplica: PIX-002
    titulo: "Validacao HMAC do webhook na primeira linha"
    descricao: "Concretiza PIX-002 do core via hook validate-webhook-signature.js — bloqueia handler que pula validacao HMAC."
  - id: PIX-EXT-003
    aplica: PIX-003
    titulo: "EndToEndId em coluna indexada"
    descricao: "Concretiza PIX-003 do core. Agente pix-arch desenha schema com indice UNIQUE."
  - id: PIX-EXT-004
    aplica: novo  # nao tem equivalente no core — e novidade Open Finance
    titulo: "Open Finance via FAPI + mTLS"
    descricao: "OAuth 2.0 + FAPI + DCR + mTLS. Skill estruturar-open-finance. Nao colide com PIX-001..005 do core."

requisitos:
  - "PSP integrado (banco, BaaS, ou direto Bacen com homologação)"
  - "ISPB da instituição conhecido"

non-goals:
  - "ser instituição financeira (PSP)"
  - "substituir SDK oficial do banco escolhido"
  - "intermediar credenciais Bacen"
