name: fintech-br
version: 0.1.0
description: Pix completo (chave, BR Code, cobrança, devolução, Pix Automático) + Open Finance Brasil + validações financeiras BR
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.4.0"

provoca:
  agents:
    - pix-arch
  commands: []
  hooks:
    - validate-webhook-signature
  skills:
    - gerar-br-code
    - validar-webhook-pix
    - estruturar-open-finance
  templates: []

regras:
  - id: PIX-001
    titulo: "Webhook Pix com HMAC obrigatório"
    descricao: "Toda notificação do PSP é verificada com HMAC + replay protection antes de processar."
  - id: PIX-002
    titulo: "Idempotência em recebimento Pix"
    descricao: "EndToEndId é chave única — handler trata duplicata sem regravar."
  - id: PIX-003
    titulo: "Open Finance via FAPI + mTLS"
    descricao: "OAuth 2.0 + FAPI + DCR + mTLS. Sem atalho."

requisitos:
  - "PSP integrado (banco, BaaS, ou direto Bacen com homologação)"
  - "ISPB da instituição conhecido"

non-goals:
  - "ser instituição financeira (PSP)"
  - "substituir SDK oficial do banco escolhido"
  - "intermediar credenciais Bacen"
