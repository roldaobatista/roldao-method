name: fintech-br
version: 1.0.0
description: Pix completo (chave, BR Code, cobrança, devolução, Pix Automático) + Open Finance Brasil + validações financeiras BR
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.4.0"

provoca:
  agents:
    - pix-arch
  commands: []
  hooks:
    - validate-webhook-signature
  skills:
    - gerar-br-code-typescript
    - validar-webhook-pix
    - estruturar-open-finance
  templates: []

regras:
  # IDs prefixados PIX-EXT-* pra nao colidir com PIX-001..005 do core
  # (que tratam de DICT, validacao de chave e TxId — semantica diferente).
  - id: PIX-EXT-001
    titulo: "Idempotência por TxId em criação de cobrança"
    descricao: "TxId é chave única — handler trata duplicata sem regravar."
  - id: PIX-EXT-002
    titulo: "Webhook Pix valida assinatura HMAC na primeira linha"
    descricao: "Toda notificação do PSP é verificada com HMAC + replay protection antes de processar. Codificado em validate-webhook-signature.sh."
  - id: PIX-EXT-003
    titulo: "EndToEndId persistido em coluna indexada"
    descricao: "Pra rastreabilidade e idempotência no recebimento. Coluna única em DB."
  - id: PIX-EXT-004
    titulo: "Open Finance via FAPI + mTLS"
    descricao: "OAuth 2.0 + FAPI + DCR + mTLS. Sem atalho. Skill estruturar-open-finance."

requisitos:
  - "PSP integrado (banco, BaaS, ou direto Bacen com homologação)"
  - "ISPB da instituição conhecido"

non-goals:
  - "ser instituição financeira (PSP)"
  - "substituir SDK oficial do banco escolhido"
  - "intermediar credenciais Bacen"
