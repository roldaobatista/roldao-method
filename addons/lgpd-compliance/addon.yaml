name: lgpd-compliance
version: 1.0.0
description: Compliance LGPD operacional — DPO virtual, RIPD automatizado, canal do titular, plano de incidente 72h
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.4.0"

provoca:
  agents:
    - dpo-virtual
  commands:
    - lgpd-audit
  hooks:
    - require-ripd-for-automated-decision
  skills:
    - gerar-ripd
    - gerar-canal-dpo
    - resposta-titular
    - responder-incidente-anpd
  templates:
    - ripd-modelo
    - dpa-operador
    - politica-privacidade
    - resposta-titular/acesso
    - resposta-titular/exclusao
    - resposta-titular/portabilidade

regras:
  - id: LGPD-EXT-001
    titulo: "RIPD obrigatório em alto risco"
    descricao: "Tratamento de alto risco exige Relatório de Impacto à Proteção de Dados antes de ir pra produção (Art. 38 LGPD)."
  - id: LGPD-EXT-002
    titulo: "Canal do titular vivo em até 15 dias corridos"
    descricao: "Solicitação LGPD do titular respondida em até 15 dias corridos (Art. 19 II — acesso em formato completo)."

requisitos:
  - "projeto com tratamento de dado pessoal"
  - "DPO designado (pessoa física ou empresa terceirizada)"

non-goals:
  - "substituir consultoria jurídica especializada"
  - "ser autoridade certificadora ANPD"
  - "garantir 100% de conformidade — orienta, não certifica"
