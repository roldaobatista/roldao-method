name: lgpd-compliance
version: 0.1.0
description: Compliance LGPD operacional — DPO virtual, RIPD automatizado, canal do titular, plano de incidente 72h
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.4.0"

provoca:
  agents:
    - dpo-virtual
  commands:
    - lgpd-audit
  hooks: []
  skills:
    - gerar-ripd
    - gerar-canal-dpo
    - resposta-titular
  templates: []

regras:
  - id: LGPD-EXT-001
    titulo: "RIPD obrigatório em alto risco"
    descricao: "Tratamento de alto risco exige Relatório de Impacto à Proteção de Dados antes de ir pra produção."
  - id: LGPD-EXT-002
    titulo: "Canal do titular vivo em &lt;15 dias"
    descricao: "Solicitação LGPD do titular respondida em até 15 dias (ANPD orientação)."

requisitos:
  - "projeto com tratamento de dado pessoal"
  - "DPO designado (pessoa física ou empresa terceirizada)"

non-goals:
  - "substituir consultoria jurídica especializada"
  - "ser autoridade certificadora ANPD"
  - "garantir 100% de conformidade — orienta, não certifica"
