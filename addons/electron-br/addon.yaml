name: electron-br
version: 1.0.0
description: Padrões para app Electron BR com SQLite local, IPC seguro e armazenamento offline de dado pessoal (LGPD)
authors:
  - Roldão Batista
license: MIT
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.3.0"

provoca:
  agents:
    - electron-arch
  commands: []
  hooks:
    - block-ipc-without-validation
  skills:
    - migration-sqlite-segura
  templates: []

regras:
  - id: ELECTRON-001
    titulo: "contextIsolation + sandbox obrigatórios"
    descricao: "Sem nodeIntegration no renderer. IPC via contextBridge com whitelist."
  - id: ELECTRON-002
    titulo: "Validação de todo input IPC"
    descricao: "Handler IPC valida tipo, range, sanitização antes de qualquer operação."
  - id: ELECTRON-003
    titulo: "Migration SQLite com backup automático"
    descricao: "Antes de aplicar migration, copia o .db pra .db.bak datado. Rollback testado."

requisitos:
  - "projeto com Electron >= 28"
  - "src/main e src/renderer separados"

non-goals:
  - "geração do projeto Electron do zero (use create-electron-app antes)"
  - "auto-updater"
  - "code signing (depende de certificado pago)"
