name: esocial-completo
version: 1.0.0
description: Addon ROLDAO-METHOD para eSocial — eventos S-1000 a S-3000, CIPA, NRs, prazos legais, retificação. Layout S-1.3 (Portaria Conjunta RFB/MTE 71/2024).
layout-esocial: "S-1.3"
layout-esocial-fonte: "Portaria Conjunta RFB/MTE 71/2024"
authors:
  - Roldão Batista
license: MIT
homepage: https://github.com/roldaobatista/roldao-method/tree/main/addons/esocial-completo
status: stable
revisado-em: 2026-05-18

requires:
  roldao-method: ">=0.5.0"

provoca:
  agents:
    - esocial-arch
  hooks:
    - validate-esocial-prazo
  skills:
    - emitir-evento-esocial
    # validar-pis-pasep movida pro core na v1.0.5 (PIS eh universal — folha, FGTS,
    # INSS, nao so eSocial). Auditoria round 11 (2026-05-25).
  commands: []
  templates:
    - eventos-esocial-cobertos.md

regras:
  - id: ESOCIAL-001
    titulo: "Eventos S-2200/S-2299 (admissão/desligamento) respeitam prazo legal"
    descricao: "Admissão até o dia anterior ao início; desligamento até o 10º dia subsequente ou no envio do TRCT/recibo, o que ocorrer primeiro."
  - id: ESOCIAL-002
    titulo: "Retificação via S-3000 mantém histórico"
    descricao: "Retificação NÃO sobrescreve evento original — gera S-3000 referenciando o anterior."
  - id: ESOCIAL-003
    titulo: "Ambiente eSocial vem de variável (produção/prod-restrita/homolog)"
    descricao: "Equivalente ao FISCAL-003 — nunca hardcode."

aplica-quando:
  - "Sistema envia eventos pra eSocial (qualquer porte de empresa)"
  - "Sistema integra com folha de pagamento"
  - "Sistema gerencia obrigações trabalhistas (CIPA, NRs, ASO)"

non-goals:
  - "cálculo de folha de pagamento (o addon orquestra envio/prazo, não calcula verbas)"
  - "geração de guias (DARF/DAE) — fora do escopo eSocial"
  - "certificação/homologação legal — orienta, não certifica"
